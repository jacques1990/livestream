<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 Split Screen</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:Arial;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:40px;
  background:#111;
  display:flex;
  gap:10px;
  align-items:center;
  padding:5px 10px;
  z-index:10;
}

button{
  padding:6px 10px;
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
}

.grid{
  position:absolute;
  top:40px;
  left:0;
  right:0;
  bottom:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:2px; /* 🔥 sharp split */
}

.frame{
  width:100%;
  height:100%;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="loadPreset()">Load Trading Preset</button>
  <button onclick="loadDefault()">Default 4</button>
</div>

<div class="grid" id="grid"></div>

<script>

// ---------------- STATE ----------------
let streams = [];
let selected = [];
const KEY = "streamsPreset";

// ---------------- LOAD JSON ----------------
fetch("https://jacques1990.github.io/livestream/streams.json")
.then(r => r.json())
.then(data => {
  streams = data;
  loadPreset(); // auto try preset
});

// ---------------- RENDER ----------------
function render(indexes){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  indexes.forEach(i=>{
    const iframe = document.createElement("iframe");
    iframe.src = streams[i].url + "?autoplay=1&mute=1";
    grid.appendChild(iframe);
  });
}

// ---------------- PRESET ----------------
function loadPreset(){
  const d = localStorage.getItem(KEY);

  if(d){
    selected = JSON.parse(d);

    if(selected.length === 4){
      render(selected);
      return;
    }
  }

  loadDefault();
}

// ---------------- DEFAULT ----------------
function loadDefault(){
  // fallback first 4 streams
  render([0,1,2,3]);
}

</script>

</body>
</html>
