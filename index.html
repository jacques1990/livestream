<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading War Room</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
}

.topbar{
  padding:10px;
  background:#111;
  display:flex;
  gap:10px;
}

button{
  padding:8px 12px;
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
}

.layout{
  display:flex;
  height:calc(100vh - 50px);
}

.main{
  flex:1;
  background:#000;
}

.main iframe{
  width:100%;
  height:100%;
  border:0;
}

.side{
  width:40%;
  overflow:auto;
  background:#0a0a0a;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#111;
  border:1px solid #333;
}

.card iframe{
  width:100%;
  height:200px;
  border:0;
}

.check{
  padding:5px;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="showAll()">All Feeds</button>
  <button onclick="fourMode()">4 Screen</button>
  <button onclick="savePreset()">Save</button>
  <button onclick="loadPreset()">Load</button>
  <button onclick="loadSplit()">Split Screen</button>
</div>

<div class="layout">
  <div class="main">
    <iframe id="mainPlayer"></iframe>
  </div>

  <div class="side">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>

// ------------------ STATE ------------------
let streams = [];
let selected = [];
const KEY = "streamsPreset";

// ------------------ LOAD JSON ------------------
fetch("https://jacques1990.github.io/livestream/streams.json")
.then(r => r.json())
.then(data => {
  streams = data;
  init();
});

// ------------------ INIT ------------------
function init(){
  render();
  openMain(0);
}

// ------------------ RENDER ------------------
function render(indexes = streams.map((_,i)=>i)){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  indexes.forEach(i=>{
    const s = streams[i];

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <iframe src="${s.url}?autoplay=1&mute=1"></iframe>
      <div class="check">
        <button onclick="openMain(${i})">Focus</button>
        <input type="checkbox" onchange="toggle(${i},this.checked)">
      </div>
    `;

    grid.appendChild(div);
  });
}

// ------------------ MAIN ------------------
function openMain(i){
  document.getElementById("mainPlayer").src =
    streams[i].url + "?autoplay=1";
}

// ------------------ SELECT ------------------
function toggle(i, checked){
  if(checked){
    if(selected.length >= 4){
      alert("Only 4 allowed");
      return;
    }
    selected.push(i);
  }else{
    selected = selected.filter(x=>x!==i);
  }
}

// ------------------ MODES ------------------
function showAll(){
  render();
}

function fourMode(){
  if(selected.length !== 4){
    alert("Select 4 streams");
    return;
  }
  render(selected);
  openMain(selected[0]);
}

// ------------------ PRESET ------------------
function savePreset(){
  localStorage.setItem(KEY, JSON.stringify(selected));
  alert("Saved");
}

function loadPreset(){
  const d = localStorage.getItem(KEY);
  if(!d) return;

  selected = JSON.parse(d);
  fourMode();
}

// ------------------ SPLIT ------------------
function loadSplit(){
  document.getElementById("mainPlayer").src =
    "https://jacques1990.github.io/livestream/splitscreen.html";
}

</script>

</body>
</html>
