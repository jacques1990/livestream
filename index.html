<script>
let streams = [];

const FAVORITE_KEY = "jacq.favoriteFourStreams.v1";

const streamGrid = document.getElementById("streamGrid");
const selectedList = document.getElementById("selectedList");
const mainPlayer = document.getElementById("mainPlayer");
const mainTitle = document.getElementById("mainTitle");
const mainStatus = document.getElementById("mainStatus");
const columnSelect = document.getElementById("columnSelect");

let selectedIndexes = [];
let currentMainIndex = 0;
let mainMuted = false;

function withParams(baseUrl, mute = true){
  const separator = baseUrl.includes("?") ? "&" : "?";
  return `${baseUrl}${separator}autoplay=1&mute=${mute ? 1 : 0}`;
}

function openMain(index, unmute = true){
  currentMainIndex = index;
  const s = streams[index];
  mainTitle.textContent = s.name;
  mainStatus.textContent = `Focused on ${s.name}`;
  mainPlayer.src = withParams(s.url, !unmute ? true : false);
  mainMuted = !unmute ? true : false;
  updateActiveCards();
}

function updateActiveCards(){
  document.querySelectorAll(".stream-card").forEach((card, idx) => {
    card.style.outline = idx === currentMainIndex ? "2px solid #e11d48" : "none";
  });
}

function renderSelectedList(){
  selectedList.innerHTML = "";
  if (selectedIndexes.length === 0){
    selectedList.innerHTML = '<div class="selected-chip">No streams selected yet.</div>';
    return;
  }
  selectedIndexes.forEach((idx, position) => {
    const chip = document.createElement("div");
    chip.className = "selected-chip";
    chip.innerHTML = `
      <span>${position + 1}. ${streams[idx].name}</span>
      <button data-remove="${idx}">Remove</button>
    `;
    selectedList.appendChild(chip);
  });

  selectedList.querySelectorAll("button[data-remove]").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = Number(btn.dataset.remove);
      selectedIndexes = selectedIndexes.filter(v => v !== idx);
      syncCheckboxes();
      renderSelectedList();
    });
  });
}

function toggleSelection(index, checked){
  if (checked){
    if (!selectedIndexes.includes(index)){
      if (selectedIndexes.length >= 4){
        alert("You can only select 4 streams for 4 Screen Mode.");
        return false;
      }
      selectedIndexes.push(index);
    }
  } else {
    selectedIndexes = selectedIndexes.filter(v => v !== index);
  }
  renderSelectedList();
  return true;
}

function syncCheckboxes(){
  document.querySelectorAll(".pick-stream").forEach(box => {
    box.checked = selectedIndexes.includes(Number(box.dataset.index));
  });
}

function buildCard(stream, index){
  const card = document.createElement("div");
  card.className = "stream-card";
  card.innerHTML = `
    <div class="stream-top">
      <div class="stream-name">${stream.name}</div>
      <div class="actions">
        <button class="focus-btn" data-index="${index}">Focus</button>
        <button class="solo-btn" data-index="${index}">Fullscreen</button>
      </div>
    </div>
    <div class="stream-frame">
      <iframe src="${withParams(stream.url, true)}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="check-row">
      <input type="checkbox" class="pick-stream" data-index="${index}">
      <label>Select for 4-screen preset</label>
    </div>
  `;
  return card;
}

function renderGrid(indexes = streams.map((_, i) => i), columns = Number(columnSelect.value || 2), mode = "all"){
  streamGrid.innerHTML = "";
  streamGrid.style.gridTemplateColumns = `repeat(${columns}, minmax(280px, 1fr))`;

  indexes.forEach(i => {
    const card = buildCard(streams[i], i);
    if (mode === "four"){
      const frame = card.querySelector(".stream-frame");
      frame.style.height = "300px";
    }
    streamGrid.appendChild(card);
  });

  streamGrid.querySelectorAll(".focus-btn").forEach(btn => {
    btn.addEventListener("click", () => openMain(Number(btn.dataset.index), true));
  });

  streamGrid.querySelectorAll(".solo-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      openMain(Number(btn.dataset.index), true);
      requestFullscreenForMain();
    });
  });

  streamGrid.querySelectorAll(".pick-stream").forEach(box => {
    const idx = Number(box.dataset.index);
    box.checked = selectedIndexes.includes(idx);
    box.addEventListener("change", (e) => {
      const ok = toggleSelection(idx, e.target.checked);
      if (!ok) e.target.checked = false;
    });
  });

  updateActiveCards();
}

function showAllFeeds(){
  renderGrid(streams.map((_, i) => i), Number(columnSelect.value || 2), "all");
}

function fourScreenMode(indexes = selectedIndexes){
  if (indexes.length !== 4){
    alert("Select exactly 4 streams using the checkboxes first.");
    return;
  }
  renderGrid(indexes, 2, "four");
  openMain(indexes[0], true);
}

function savePreset(){
  if (selectedIndexes.length !== 4){
    alert("Pick exactly 4 streams before saving your favorite preset.");
    return;
  }
  localStorage.setItem(FAVORITE_KEY, JSON.stringify(selectedIndexes));
  alert("Favorite 4 streams saved.");
}

function loadPreset(){
  const raw = localStorage.getItem(FAVORITE_KEY);
  if (!raw){
    alert("No saved preset found yet.");
    return;
  }
  try{
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed) || parsed.length !== 4) throw new Error("Bad preset");
    selectedIndexes = parsed;
    syncCheckboxes();
    renderSelectedList();
    fourScreenMode(parsed);
  }catch(err){
    alert("Saved preset could not be loaded.");
  }
}

function clearPreset(){
  localStorage.removeItem(FAVORITE_KEY);
  selectedIndexes = [];
  syncCheckboxes();
  renderSelectedList();
  showAllFeeds();
}

function requestFullscreenForMain(){
  const wrap = document.querySelector(".main-player-wrap");
  if (wrap.requestFullscreen) wrap.requestFullscreen();
}

function loadSplit() {
  mainPlayer.src = "https://jacques1990.github.io/livestream/splitscreen.html";
}

/* ✅ JSON LOAD (THE FIX) */
fetch("https://jacques1990.github.io/livestream/streams.json")
  .then(res => res.json())
  .then(data => {
    streams = data;

    renderSelectedList();
    showAllFeeds();
    openMain(0, true);

    const saved = localStorage.getItem(FAVORITE_KEY);
    if (saved){
      try{
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length === 4){
          selectedIndexes = parsed;
          renderSelectedList();
          syncCheckboxes();
        }
      }catch(e){}
    }
  });

document.getElementById("showAllBtn").addEventListener("click", showAllFeeds);
document.getElementById("fourScreenBtn").addEventListener("click", () => fourScreenMode());
document.getElementById("savePresetBtn").addEventListener("click", savePreset);
document.getElementById("loadPresetBtn").addEventListener("click", loadPreset);
document.getElementById("clearPresetBtn").addEventListener("click", clearPreset);
document.getElementById("fullscreenMain").addEventListener("click", requestFullscreenForMain);

document.getElementById("muteToggle").addEventListener("click", () => {
  mainMuted = !mainMuted;
  const currentUrl = streams[currentMainIndex].url;
  mainPlayer.src = withParams(currentUrl, mainMuted);
  mainStatus.textContent = `${streams[currentMainIndex].name} • ${mainMuted ? "Muted" : "Unmuted"}`;
});

columnSelect.addEventListener("change", () => {
  const currentCards = Array.from(document.querySelectorAll(".stream-card .focus-btn")).map(btn => Number(btn.dataset.index));
  const indexes = currentCards.length ? currentCards : streams.map((_, i) => i);
  const mode = indexes.length === 4 ? "four" : "all";
  renderGrid(indexes, Number(columnSelect.value || 2), mode);
});

</script>
